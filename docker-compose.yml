services:

  front-end:
    image: wesleymime/finances-front-end
    restart: always
    ports:
      - "80:4200"

  api:
    image: wesleymime/finances-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    entrypoint: [
      "java",
      "-Dspring.profiles.active=prod",
      "-DPOSTGRES_URL=db:5432/finances-api",
      "-DPOSTGRES_USERNAME=finances-api",
      "-DPOSTGRES_PASSWORD=finances-api",
      #      change jwt key:
      "-DJWT_SECRET=ME7SXkNLos9X6azj8/SMMLXxiq7Wg32PBzTNNohxZ+ykIwKVKMeWmtMwJNl6zhi8QgvcWCmjWu9m4fQagyW0IQ==",
      "-DREDIS_URL=redis",
      "-DAI_API_KEY=CHANGEKEY",
      #      change 256 bits key:
      "-DENCRYPTION_KEY=Cs8RW9lbHWttsR0pUN45UyjhP1m6leXdIdlXJcRAWtM=",
      "-jar",
      "/app.jar"
    ]

  db:
    image: postgres:17
    restart: always
    environment:
      POSTGRES_DB: CHANGEDB
      POSTGRES_USER: CHANGEUSR
      POSTGRES_PASSWORD: CHANGEPWD
    volumes:
      - db_data:/var/lib/postgresql/data
    #    encrypt.key deve ser igual ao valor de ENCRYPTION_KEY
    command: -c encrypt.key=Cs8RW9lbHWttsR0pUN45UyjhP1m6leXdIdlXJcRAWtM=

  redis:
    image: redis
    ports:
      - "6379:6379"

volumes:
  db_data: