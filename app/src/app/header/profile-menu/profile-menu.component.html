<div class="profile-container">
  <div class="profile-icon" (click)="toggleMenu()">
    {{ initial }}
  </div>

   @if (isOpen) {
    <div class="profile-dropdown-menu">
        <ul>
          @if (client) {
            <li style="cursor: default">Olá, {{ client.name }}</li>
          }
          <li (click)="selectOption('Editar')">Configurações</li>
          <li (click)="selectOption('Logout')">Sair</li>
        </ul>
    </div>
  }
</div>
