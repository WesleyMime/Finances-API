finances:
    jwt:
        expiration: 1800000000
        secret: ${JWT_SECRET:ME7SXkNLos9X6azj8/SMMLXxiq7Wg32PBzTNNohxZ+ykIwKVKMeWmtMwJNl6zhi8QgvcWCmjWu9m4fQagyW0IQ==}
spring:
    sql:
      init:
        mode: ALWAYS
    datasource:
        driver-class-name: org.postgresql.Driver
        password: ${POSTGRES_PASSWORD:finances-api}
        url: jdbc:postgresql://${POSTGRES_URL:localhost:5432/finances-api}
        username: ${POSTGRES_USERNAME:finances-api}
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true

    ai:
        openai:
            api-key: ${AI_API_KEY}
            base-url: ${AI_BASE_URL:https://api.groq.com/openai}
            chat:
                options:
                    model: ${AI_MODEL:qwen/qwen3-32b}

    data:
        redis:
            host: ${REDIS_URL:localhost}

    output:
        ansi:
            enabled: ALWAYS

    flyway:
        enabled: true
        locations: classpath:db/migration
        placeholders:
            encryption_key: ${ENCRYPTION_KEY:Cs8RW9lbHWttsR0pUN45UyjhP1m6leXdIdlXJcRAWtM=}
        placeholder-replacement: true
        baseline-on-migrate: true

logging:
    level:
        org:
            springframework: DEBUG